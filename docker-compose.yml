x-backend-env: &backend-env
  NODE_ENV: development
  PORT: "3000"
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USERNAME: postgres
  DB_PASSWORD: postgres
  DB_NAME: taskforge
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  JWT_SECRET: docker-dev-secret-change-me-at-least-32-chars
  ACCESS_TOKEN_TTL: 15m
  REFRESH_TOKEN_TTL: 7d
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  STRIPE_PRICE_ID_PRO: ""
  STRIPE_PRICE_ID_ENTERPRISE: ""
  FRONTEND_URL: http://localhost:3000

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: ./backend
    command: ["node", "dist/run-migrations.js"]
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./backend
    command: ["node", "dist/main"]
    ports:
      - "3000:3000"
    environment:
      <<: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ./backend
    command: ["node", "dist/worker"]
    environment:
      <<: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  pgdata:
