worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:3000;
    }

    # Generate request ID if not provided by client
    map $http_x_request_id $request_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 256;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client limits
    client_max_body_size 10M;

    # Logging
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent" '
                    'req_id=$request_id '
                    'upstream_time=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        # Proxy common headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # API routes
        location /api/ {
            proxy_pass http://api;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # WebSocket (Socket.io)
        location /socket.io/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Health check passthrough (for external monitoring)
        location = /health {
            proxy_pass http://api/api/v1/health;
            proxy_read_timeout 5s;
        }

        # Default — return 404 for unknown routes
        location / {
            return 404 '{"error":"Not Found"}';
            add_header Content-Type application/json;
        }
    }
}
