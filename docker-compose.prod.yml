x-backend-image: &backend-image
  image: ghcr.io/engmaryamameen/taskforge-backend:${TAG:-latest}

x-backend-env: &backend-env
  NODE_ENV: production
  PORT: "3000"
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_NAME: ${DB_NAME}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  JWT_SECRET: ${JWT_SECRET}
  ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
  REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-7d}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
  STRIPE_PRICE_ID_PRO: ${STRIPE_PRICE_ID_PRO:-}
  STRIPE_PRICE_ID_ENTERPRISE: ${STRIPE_PRICE_ID_ENTERPRISE:-}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    <<: *backend-image
    command: ["node", "dist/run-migrations.js"]
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    <<: *backend-image
    command: ["node", "dist/main"]
    environment:
      <<: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  worker:
    <<: *backend-image
    command: ["node", "dist/worker"]
    environment:
      <<: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
