<svg width="720" height="180" viewBox="0 0 720 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TaskForge Logo</title>
  <desc id="desc">TaskForge professional SaaS logo with blue app icon and dark wordmark.</desc>
  <defs>
    <linearGradient id="tf-blue" x1="28" y1="24" x2="150" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1677FF"/>
      <stop offset="0.55" stop-color="#0C5FD9"/>
      <stop offset="1" stop-color="#0752C6"/>
    </linearGradient>
    <filter id="soft-shadow" x="10" y="10" width="160" height="160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0C5FD9" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <rect x="30" y="30" width="120" height="120" rx="30" fill="url(#tf-blue)"/>
    <!-- Custom TaskForge mark: forged T + lightning momentum -->
    <path d="M72 62H122L116 75H98.5L79 119L91 91H67L72 62Z" fill="white"/>
    <path d="M98 76L123 76L89 126L97 96H78L98 76Z" fill="white" fill-opacity="0.95"/>
  </g>

  <text x="190" y="113" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="800" letter-spacing="-2.4" fill="#071126">TaskForge</text>
</svg>